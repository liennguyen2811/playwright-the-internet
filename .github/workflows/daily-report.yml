name: Playwright Daily Report

on:
  schedule:
    - cron: '0 0 * * *'  # 7:00 AM Vietnam (UTC+7 = 00:00 UTC)
  workflow_dispatch:      # cho phep chay thu cong bat cu luc nao

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        id: run_tests
        run: npx playwright test --project=chromium
        continue-on-error: true

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-html-report
          path: playwright-report/
          retention-days: 14

      - name: Parse test results
        id: results
        if: always()
        run: |
          if [ -f "test-results/results.json" ]; then
            PASSED=$(jq '.stats.expected' test-results/results.json)
            FAILED=$(jq '.stats.unexpected' test-results/results.json)
            SKIPPED=$(jq '.stats.skipped' test-results/results.json)
            TOTAL=$(jq '.stats.total' test-results/results.json)
            DURATION=$(jq '.stats.duration' test-results/results.json)
            DURATION_MIN=$(echo "$DURATION / 60000" | bc)
          else
            PASSED=0; FAILED=0; SKIPPED=0; TOTAL=0; DURATION_MIN=0
          fi
          echo "passed=$PASSED"     >> $GITHUB_OUTPUT
          echo "failed=$FAILED"     >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED"   >> $GITHUB_OUTPUT
          echo "total=$TOTAL"       >> $GITHUB_OUTPUT
          echo "duration=$DURATION_MIN" >> $GITHUB_OUTPUT

          if [ "$FAILED" -eq "0" ]; then
            echo "status=PASSED" >> $GITHUB_OUTPUT
            echo "icon=✅"       >> $GITHUB_OUTPUT
            echo "color=#28a745" >> $GITHUB_OUTPUT
          else
            echo "status=FAILED" >> $GITHUB_OUTPUT
            echo "icon=❌"       >> $GITHUB_OUTPUT
            echo "color=#dc3545" >> $GITHUB_OUTPUT
          fi

      - name: Send email report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "${{ steps.results.outputs.icon }} Playwright Daily Report — ${{ steps.results.outputs.status }} (${{ steps.results.outputs.passed }}/${{ steps.results.outputs.total }} passed)"
          to: liennguyen2811@gmail.com
          from: "Playwright CI <${{ secrets.GMAIL_USER }}>"
          html_body: |
            <!DOCTYPE html>
            <html>
            <body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; color: #333;">

              <div style="background: ${{ steps.results.outputs.color }}; color: white; padding: 20px; border-radius: 8px; text-align: center;">
                <h1 style="margin: 0; font-size: 24px;">
                  ${{ steps.results.outputs.icon }} Playwright Daily Report
                </h1>
                <p style="margin: 8px 0 0; font-size: 16px; opacity: 0.9;">
                  ${{ steps.results.outputs.status }}
                </p>
              </div>

              <div style="background: #f8f9fa; border-radius: 8px; padding: 20px; margin: 20px 0;">
                <h2 style="margin: 0 0 16px; font-size: 18px;">📊 Kết quả</h2>
                <table style="width: 100%; border-collapse: collapse;">
                  <tr>
                    <td style="padding: 8px 0; font-size: 15px;">✅ Passed</td>
                    <td style="padding: 8px 0; font-size: 15px; font-weight: bold; text-align: right; color: #28a745;">
                      ${{ steps.results.outputs.passed }}
                    </td>
                  </tr>
                  <tr style="border-top: 1px solid #dee2e6;">
                    <td style="padding: 8px 0; font-size: 15px;">❌ Failed</td>
                    <td style="padding: 8px 0; font-size: 15px; font-weight: bold; text-align: right; color: #dc3545;">
                      ${{ steps.results.outputs.failed }}
                    </td>
                  </tr>
                  <tr style="border-top: 1px solid #dee2e6;">
                    <td style="padding: 8px 0; font-size: 15px;">⏭️ Skipped</td>
                    <td style="padding: 8px 0; font-size: 15px; font-weight: bold; text-align: right; color: #6c757d;">
                      ${{ steps.results.outputs.skipped }}
                    </td>
                  </tr>
                  <tr style="border-top: 1px solid #dee2e6;">
                    <td style="padding: 8px 0; font-size: 15px;">📋 Total</td>
                    <td style="padding: 8px 0; font-size: 15px; font-weight: bold; text-align: right;">
                      ${{ steps.results.outputs.total }}
                    </td>
                  </tr>
                  <tr style="border-top: 1px solid #dee2e6;">
                    <td style="padding: 8px 0; font-size: 15px;">⏱️ Duration</td>
                    <td style="padding: 8px 0; font-size: 15px; font-weight: bold; text-align: right;">
                      ~${{ steps.results.outputs.duration }} phút
                    </td>
                  </tr>
                </table>
              </div>

              <div style="text-align: center; margin: 20px 0;">
                <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                   style="background: #0d6efd; color: white; padding: 12px 24px; border-radius: 6px; text-decoration: none; font-size: 15px; display: inline-block;">
                  🔗 Xem chi tiết trên GitHub Actions
                </a>
              </div>

              <div style="border-top: 1px solid #dee2e6; padding-top: 16px; margin-top: 20px; font-size: 13px; color: #6c757d; text-align: center;">
                <p style="margin: 0;">Tự động gửi lúc 7:00 AM mỗi ngày • playwright-the-internet</p>
                <p style="margin: 4px 0 0;">Run #${{ github.run_number }} • ${{ github.sha }}</p>
              </div>

            </body>
            </html>
