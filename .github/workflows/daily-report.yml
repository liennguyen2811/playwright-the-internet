name: Playwright Daily Report

on:
  schedule:
    - cron: '0 0 * * *'  # 7:00 AM Vietnam (UTC+7 = 00:00 UTC)
  workflow_dispatch:      # cho phep chay thu cong bat cu luc nao

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        id: run_tests
        run: npx playwright test --project=chromium
        continue-on-error: true

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-html-report
          path: playwright-report/
          retention-days: 14

      - name: Parse test results
        id: results
        if: always()
        run: |
          if [ -f "test-results/results.json" ]; then
            PASSED=$(jq '.stats.expected' test-results/results.json)
            FAILED=$(jq '.stats.unexpected' test-results/results.json)
            SKIPPED=$(jq '.stats.skipped' test-results/results.json)
            TOTAL=$(jq '.stats.total' test-results/results.json)
            DURATION=$(jq '.stats.duration' test-results/results.json)
            DURATION_MIN=$(echo "$DURATION / 60000" | bc)
          else
            PASSED=0; FAILED=0; SKIPPED=0; TOTAL=0; DURATION_MIN=0
          fi
          echo "passed=$PASSED"       >> $GITHUB_OUTPUT
          echo "failed=$FAILED"       >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED"     >> $GITHUB_OUTPUT
          echo "total=$TOTAL"         >> $GITHUB_OUTPUT
          echo "duration=$DURATION_MIN" >> $GITHUB_OUTPUT

          if [ "$FAILED" -eq "0" ]; then
            echo "status=PASSED" >> $GITHUB_OUTPUT
            echo "icon=✅"       >> $GITHUB_OUTPUT
            echo "color=#28a745" >> $GITHUB_OUTPUT
          else
            echo "status=FAILED" >> $GITHUB_OUTPUT
            echo "icon=❌"       >> $GITHUB_OUTPUT
            echo "color=#dc3545" >> $GITHUB_OUTPUT
          fi

      - name: Send email report
        if: always()
        env:
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          STATUS:         ${{ steps.results.outputs.status }}
          ICON:           ${{ steps.results.outputs.icon }}
          COLOR:          ${{ steps.results.outputs.color }}
          PASSED:         ${{ steps.results.outputs.passed }}
          FAILED:         ${{ steps.results.outputs.failed }}
          SKIPPED:        ${{ steps.results.outputs.skipped }}
          TOTAL:          ${{ steps.results.outputs.total }}
          DURATION:       ${{ steps.results.outputs.duration }}
          RUN_URL:        ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_NUMBER:     ${{ github.run_number }}
        run: |
          python3 << 'EOF'
          import smtplib, os
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText

          user     = os.environ['GMAIL_USER']
          password = os.environ['GMAIL_PASSWORD']
          status   = os.environ['STATUS']
          icon     = os.environ['ICON']
          color    = os.environ['COLOR']
          passed   = os.environ['PASSED']
          failed   = os.environ['FAILED']
          skipped  = os.environ['SKIPPED']
          total    = os.environ['TOTAL']
          duration = os.environ['DURATION']
          run_url  = os.environ['RUN_URL']
          run_num  = os.environ['RUN_NUMBER']

          subject = f"{icon} Playwright Daily Report — {status} ({passed}/{total} passed)"

          html = f"""<!DOCTYPE html>
          <html>
          <body style="font-family:Arial,sans-serif;max-width:600px;margin:0 auto;padding:20px;color:#333;">
            <div style="background:{color};color:white;padding:20px;border-radius:8px;text-align:center;">
              <h1 style="margin:0;font-size:24px;">{icon} Playwright Daily Report</h1>
              <p style="margin:8px 0 0;font-size:16px;opacity:0.9;">{status}</p>
            </div>
            <div style="background:#f8f9fa;border-radius:8px;padding:20px;margin:20px 0;">
              <h2 style="margin:0 0 16px;font-size:18px;">📊 Kết quả</h2>
              <table style="width:100%;border-collapse:collapse;">
                <tr>
                  <td style="padding:8px 0;font-size:15px;">✅ Passed</td>
                  <td style="padding:8px 0;font-size:15px;font-weight:bold;text-align:right;color:#28a745;">{passed}</td>
                </tr>
                <tr style="border-top:1px solid #dee2e6;">
                  <td style="padding:8px 0;font-size:15px;">❌ Failed</td>
                  <td style="padding:8px 0;font-size:15px;font-weight:bold;text-align:right;color:#dc3545;">{failed}</td>
                </tr>
                <tr style="border-top:1px solid #dee2e6;">
                  <td style="padding:8px 0;font-size:15px;">⏭️ Skipped</td>
                  <td style="padding:8px 0;font-size:15px;font-weight:bold;text-align:right;color:#6c757d;">{skipped}</td>
                </tr>
                <tr style="border-top:1px solid #dee2e6;">
                  <td style="padding:8px 0;font-size:15px;">📋 Total</td>
                  <td style="padding:8px 0;font-size:15px;font-weight:bold;text-align:right;">{total}</td>
                </tr>
                <tr style="border-top:1px solid #dee2e6;">
                  <td style="padding:8px 0;font-size:15px;">⏱️ Duration</td>
                  <td style="padding:8px 0;font-size:15px;font-weight:bold;text-align:right;">~{duration} phút</td>
                </tr>
              </table>
            </div>
            <div style="text-align:center;margin:20px 0;">
              <a href="{run_url}"
                 style="background:#0d6efd;color:white;padding:12px 24px;border-radius:6px;text-decoration:none;font-size:15px;display:inline-block;">
                🔗 Xem chi tiết trên GitHub Actions
              </a>
            </div>
            <div style="border-top:1px solid #dee2e6;padding-top:16px;margin-top:20px;font-size:13px;color:#6c757d;text-align:center;">
              <p style="margin:0;">Tự động gửi lúc 7:00 AM mỗi ngày • playwright-the-internet</p>
              <p style="margin:4px 0 0;">Run #{run_num}</p>
            </div>
          </body>
          </html>"""

          msg = MIMEMultipart('alternative')
          msg['Subject'] = subject
          msg['From']    = user
          msg['To']      = user
          msg.attach(MIMEText(html, 'html'))

          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as server:
              server.login(user, password)
              server.sendmail(user, user, msg.as_string())

          print("Email sent successfully!")
          EOF
